<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>温馨提示</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f5f5f5;
  }
  .tip {
    position: absolute;
    padding: 10px 20px;
    border-radius: 10px;
    color: #333;
    font-size: 16px;
    font-family: "微软雅黑";
    animation: fadeout 4s forwards;
  }
  @keyframes fadeout {
    0% {opacity: 1;}
    80% {opacity: 1;}
    100% {opacity: 0;}
  }
</style>
</head>
<body>

<script>
const tips = [
  '多喝水哦~', '保持微笑呀~', '每天都要元气满满',
  '记得吃水果', '保持好心情', '好好爱自己', '我想你了',
  '梦想成真', '期待下一次见面', '金榜题名', '顺顺利利',
  '早点休息', '愿所有烦恼都消失', '别熬夜', '今天过得开心嘛',
  '天冷了，多穿衣服'
];

const colors = [
  'lightpink','skyblue','lightgreen','lavender','lightyellow',
  'plum','coral','bisque','aquamarine','mistyrose','honeydew',
  'lavenderblush','oldlace'
];

function createTip() {
  const div = document.createElement('div');
  div.className = 'tip';
  div.textContent = tips[Math.floor(Math.random() * tips.length)];
  div.style.background = colors[Math.floor(Math.random() * colors.length)];

  const x = Math.random() * (window.innerWidth - 250);
  const y = Math.random() * (window.innerHeight - 60);
  div.style.left = x + 'px';
  div.style.top = y + 'px';
  document.body.appendChild(div);

  setTimeout(() => div.remove(), 4000); // 4秒后自动消失
}

// 每隔0.1秒弹出一个小窗口
setInterval(createTip, 100);
</script>

</body>
</html>
