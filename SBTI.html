let pool=[],i=0;
let score = {
    E:0, I:0,
    S:0, N:0,
    T:0, F:0,
    J:0, P:0
};

function start(){
    pool = [...allQuestions].sort(()=>Math.random()-0.5);
    document.getElementById("start").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    next();
}

function next(){
    if(i >= pool.length){show();return;}
    let item=pool[i];
    document.getElementById("q").innerText=item.q;

    let html="";
    item.opts.forEach(o=>{
        html+=`<div class="option" onclick="tap('${o.type}')">${o.text}</div>`;
    });

    document.getElementById("opts").innerHTML=html;
    document.getElementById("bar").style.width=(i/pool.length*100)+"%";
}

function tap(t){
    score[t]++;
    i++;
    next();
}

function show(){
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("res").classList.remove("hidden");
